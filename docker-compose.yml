services:
  db:
    image: mariadb:lts-ubi9
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db:/var/lib/mysql
      - ./db/my.cnf:/etc/mysql/conf.d/matomo.cnf:ro
    healthcheck:
      test:
        [
          "CMD",
          "mariadb",
          "-u",
          "${MARIADB_USER}",
          "-p${MARIADB_PASSWORD}",
          "-e",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  redis:
    image: redis:8.6.3-trixie
    restart: unless-stopped
    volumes:
      - redis:/data
    networks:
      - internal

  matomo:
    image: matomo:5.10.0-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      MATOMO_DATABASE_HOST: ${MARIADB_HOST}
      MATOMO_DATABASE_USERNAME: ${MARIADB_USER}
      MATOMO_DATABASE_PASSWORD: ${MARIADB_PASSWORD}
      MATOMO_DATABASE_DBNAME: ${MARIADB_DATABASE}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.matomo.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.matomo.entrypoints=websecure"
      - "traefik.http.routers.matomo.tls.certresolver=myresolver"
      - "traefik.http.services.matomo.loadbalancer.server.port=80"
      # Gzip compression
      - "traefik.http.routers.matomo.middlewares=compress-matomo@docker"
      - "traefik.http.middlewares.compress-matomo.compress=true"
    volumes:
      - matomo:/var/www/html
    networks:
      - internal
      - web

  matomo-cron:
    build: ./matomo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MATOMO_DATABASE_HOST: ${MARIADB_HOST}
      MATOMO_DATABASE_USERNAME: ${MARIADB_USER}
      MATOMO_DATABASE_PASSWORD: ${MARIADB_PASSWORD}
      MATOMO_DATABASE_DBNAME: ${MARIADB_DATABASE}
      DOMAIN_NAME: ${DOMAIN_NAME}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - matomo:/var/www/html
      - ./matomo/entrypoint.sh:/entrypoint.sh:ro
      - ./matomo/rsyslog.conf:/etc/rsyslog.conf:ro
    entrypoint: /bin/bash
    command: /entrypoint.sh
    networks:
      - internal

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=web"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--api.insecure=true"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "./traefik/acme.json:/letsencrypt/acme.json"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/logs:/var/log/traefik"
    networks:
      - web

volumes:
  db:
  matomo:
  redis:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
    name: web
